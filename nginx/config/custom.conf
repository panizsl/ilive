server {
  listen 80;
  server_name _;

  # Cache immutable static assets from Next
  location /_next/static/ {
    proxy_pass http://next_app;
    # In dev, avoid aggressive caching to prevent stale bundles
    expires off;
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
  }

  # Proxy all other requests to the Next server
  location / {
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Force no-cache for HTML and dynamic routes in dev
    proxy_hide_header Cache-Control;
    proxy_hide_header Pragma;
    proxy_hide_header Expires;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }
}

upstream next_app {
  # Single-container setup: proxy to local Next server
  server 127.0.0.1:3000;
}